    <!--
      SPA refresh fallback: if the static host served 404.html for a deep link
      (e.g. /shop, /product/xyz), 404.html stashes the original path in
      sessionStorage and bounces here. We restore it via history.replaceState
      BEFORE React boots, so the router lands on the right page.
    -->
    <script>
      (function () {
        try {
          var redirect = sessionStorage.getItem('spa-redirect');
          if (redirect) {
            sessionStorage.removeItem('spa-redirect');
            if (redirect !== window.location.pathname + window.location.search + window.location.hash) {
              window.history.replaceState(null, '', redirect);
            }
          }
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
